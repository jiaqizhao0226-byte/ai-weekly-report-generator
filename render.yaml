services:
  - type: web
    name: ai-weekly-report-generator
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT
    envVars:
      - key: BRAVE_API_KEY
        sync: false
      - key: QWEN_API_KEY
        sync: false
