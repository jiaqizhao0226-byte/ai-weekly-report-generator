<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 行业监控周报生成器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            color: #e0e0e0;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }
        
        header {
            text-align: center;
            padding: 20px 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            margin-bottom: 20px;
        }
        
        header h1 {
            font-size: 2em;
            background: linear-gradient(90deg, #00d9ff, #00ff88);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }
        
        header p {
            color: #888;
            font-size: 1em;
        }
        
        .controls {
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            align-items: flex-end;
        }
        
        .control-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        
        .control-group label {
            font-size: 0.85em;
            color: #aaa;
        }
        
        input, select {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 6px;
            padding: 10px 14px;
            color: #fff;
            font-size: 0.95em;
            min-width: 160px;
        }
        
        input:focus, select:focus {
            outline: none;
            border-color: #00d9ff;
        }
        
        button {
            background: linear-gradient(90deg, #00d9ff, #00ff88);
            border: none;
            border-radius: 6px;
            padding: 12px 24px;
            color: #1a1a2e;
            font-size: 0.95em;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 20px rgba(0,217,255,0.4);
        }
        
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        
        .btn-generate {
            background: linear-gradient(90deg, #ff6b6b, #feca57);
        }
        
        .categories {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-bottom: 20px;
        }
        
        @media (max-width: 1200px) {
            .categories {
                grid-template-columns: 1fr;
            }
        }
        
        .category {
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            padding: 15px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        
        .category h2 {
            font-size: 1.1em;
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 2px solid;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .category h2 .count {
            font-size: 0.8em;
            opacity: 0.7;
        }
        
        .category.model h2 { border-color: #00d9ff; color: #00d9ff; }
        .category.application h2 { border-color: #00ff88; color: #00ff88; }
        .category.investment h2 { border-color: #feca57; color: #feca57; }
        
        .news-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
            max-height: 450px;
            overflow-y: auto;
        }
        
        .news-item {
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
            padding: 12px;
            cursor: pointer;
            transition: all 0.2s;
            border: 2px solid transparent;
            position: relative;
        }
        
        .news-item:hover {
            background: rgba(255,255,255,0.1);
        }
        
        .news-item.selected {
            border-color: #00ff88;
            background: rgba(0,255,136,0.1);
        }
        
        .news-item .date-badge {
            position: absolute;
            top: 8px;
            right: 8px;
            background: rgba(0,0,0,0.5);
            padding: 3px 8px;
            border-radius: 4px;
            font-size: 0.75em;
            color: #feca57;
            font-weight: bold;
        }
        
        .news-item .importance-badge {
            position: absolute;
            top: 8px;
            left: 8px;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.7em;
            font-weight: bold;
        }
        
        .importance-high { background: #ff6b6b; color: white; }
        .importance-medium { background: #feca57; color: #1a1a2e; }
        .importance-low { background: #666; color: white; }
        
        .news-item .gaming-tag {
            position: absolute;
            top: 8px;
            left: 38px;
            background: #9b59b6;
            padding: 2px 6px;
            border-radius: 3px;
            font-size: 0.65em;
            color: white;
        }

        .news-item .search-tag {
            position: absolute;
            top: 8px;
            left: 38px;
            background: #e17055;
            padding: 2px 6px;
            border-radius: 3px;
            font-size: 0.65em;
            color: white;
        }
        
        .news-item .title {
            font-weight: bold;
            margin-bottom: 6px;
            margin-top: 20px;
            line-height: 1.4;
            padding-right: 60px;
        }
        
        .news-item .desc {
            font-size: 0.85em;
            color: #999;
            line-height: 1.5;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        
        .news-item .meta {
            margin-top: 8px;
            font-size: 0.75em;
            color: #666;
            display: flex;
            justify-content: space-between;
        }
        
        .news-item .source-link a {
            color: #00d9ff;
            text-decoration: none;
        }
        
        .news-item .source-link a:hover {
            text-decoration: underline;
        }
        
        .selected-panel {
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            padding: 20px;
            margin-top: 15px;
        }
        
        .selected-panel h3 {
            margin-bottom: 12px;
            color: #00ff88;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .selected-panel h3 .hint {
            font-size: 0.75em;
            color: #888;
            font-weight: normal;
        }
        
        .selected-items {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        
        .selected-tag {
            background: rgba(0,255,136,0.2);
            border: 1px solid #00ff88;
            border-radius: 16px;
            padding: 6px 12px;
            font-size: 0.85em;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        .selected-tag.model { border-color: #00d9ff; background: rgba(0,217,255,0.2); }
        .selected-tag.application { border-color: #00ff88; background: rgba(0,255,136,0.2); }
        .selected-tag.investment { border-color: #feca57; background: rgba(254,202,87,0.2); }
        
        .selected-tag .remove {
            cursor: pointer;
            opacity: 0.7;
            font-size: 0.9em;
        }
        
        .selected-tag .remove:hover {
            opacity: 1;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: #888;
        }
        
        .loading .spinner {
            width: 36px;
            height: 36px;
            border: 3px solid rgba(255,255,255,0.1);
            border-top-color: #00d9ff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 12px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .empty {
            text-align: center;
            padding: 25px;
            color: #666;
        }
        
        .add-news-box {
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid rgba(255,255,255,0.1);
            display: flex;
            gap: 8px;
        }
        
        .add-news-input {
            flex: 1;
            min-width: 0;
            font-size: 0.85em;
            padding: 8px 12px;
        }
        
        .add-news-btn {
            padding: 8px 14px;
            font-size: 0.85em;
            white-space: nowrap;
            background: linear-gradient(90deg, #6c5ce7, #a29bfe);
        }
        
        .add-news-btn:hover {
            box-shadow: 0 4px 15px rgba(108,92,231,0.4);
        }
        
        .news-item.custom {
            border-left: 3px solid #a29bfe;
        }
        
        .news-item .custom-tag {
            position: absolute;
            top: 8px;
            left: 8px;
            background: #6c5ce7;
            padding: 2px 6px;
            border-radius: 3px;
            font-size: 0.65em;
            color: white;
        }
        
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        
        .modal.active {
            display: flex;
        }
        
        .modal-content {
            background: #1a1a2e;
            border-radius: 12px;
            padding: 25px;
            max-width: 450px;
            width: 90%;
            text-align: center;
        }
        
        .status {
            padding: 8px 12px;
            border-radius: 6px;
            margin-top: 15px;
            display: none;
            font-size: 0.9em;
        }
        
        .status.success {
            display: block;
            background: rgba(0,255,136,0.2);
            color: #00ff88;
        }
        
        .status.error {
            display: block;
            background: rgba(255,107,107,0.2);
            color: #ff6b6b;
        }
        
        .stats {
            display: flex;
            gap: 20px;
            margin-left: auto;
            font-size: 0.85em;
            color: #888;
        }
        
        .stats span {
            display: flex;
            align-items: center;
            gap: 4px;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🤖 AI 行业监控周报生成器</h1>
            <p>选择时间范围 → 筛选重要新闻 → 生成专业 PPT</p>
        </header>
        
        <div class="controls">
            <div class="control-group">
                <label>时间范围</label>
                <select id="dateRange">
                    <option value="7">过去 7 天</option>
                    <option value="14">过去 14 天</option>
                    <option value="30">过去 30 天</option>
                </select>
            </div>
            
            <div class="control-group">
                <label>报告日期</label>
                <input type="text" id="reportDate" placeholder="2024年3月第4周">
            </div>
            
            <button onclick="searchNews()">🔍 获取新闻</button>
            <button class="btn-generate" onclick="generatePPT()" id="generateBtn" disabled>📊 生成 PPT</button>

            <div class="stats">
                <span>📰 备选: <strong id="totalCount">0</strong></span>
                <span>✅ 已选: <strong id="selectedCount">0</strong>/10</span>
            </div>
        </div>

        <!-- 关键词搜索区域 -->
        <div class="controls" style="margin-top: -10px;">
            <div class="control-group" style="flex: 1;">
                <label>🔍 关键词搜索公众号文章</label>
                <input type="text" id="keywordInput" placeholder="输入关键词，如：GPT-5, 大模型, Sora（逗号或空格分隔）" style="width: 100%;">
            </div>
            <button onclick="keywordSearch()" id="keywordSearchBtn" style="background: linear-gradient(90deg, #6c5ce7, #a29bfe);">🔍 搜索文章</button>
        </div>
        
        <div class="categories" id="newsContainer">
            <div class="category model">
                <h2>🧠 模型动态 <span class="count" id="model-count">(0)</span></h2>
                <div class="news-list" id="model-list">
                    <div class="empty">点击"获取新闻"开始</div>
                </div>
                <div class="add-news-box">
                    <input type="text" id="add-model-input" placeholder="输入链接或新闻标题..." class="add-news-input">
                    <button onclick="addCustomNews('model')" class="add-news-btn">➕ 添加</button>
                </div>
            </div>
            
            <div class="category application">
                <h2>📱 应用动态 <span class="count" id="application-count">(0)</span></h2>
                <div class="news-list" id="application-list">
                    <div class="empty">点击"获取新闻"开始</div>
                </div>
                <div class="add-news-box">
                    <input type="text" id="add-application-input" placeholder="输入链接或新闻标题..." class="add-news-input">
                    <button onclick="addCustomNews('application')" class="add-news-btn">➕ 添加</button>
                </div>
            </div>
            
            <div class="category investment">
                <h2>💰 厂商&投融资 <span class="count" id="investment-count">(0)</span></h2>
                <div class="news-list" id="investment-list">
                    <div class="empty">点击"获取新闻"开始</div>
                </div>
                <div class="add-news-box">
                    <input type="text" id="add-investment-input" placeholder="输入链接或新闻标题..." class="add-news-input">
                    <button onclick="addCustomNews('investment')" class="add-news-btn">➕ 添加</button>
                </div>
            </div>
        </div>
        
        <div class="selected-panel">
            <h3>
                ✅ 已选新闻 
                <span class="hint">建议选择 8-12 条，按重要性排序</span>
            </h3>
            <div class="selected-items" id="selectedItems">
                <span style="color: #666">点击新闻卡片进行选择</span>
            </div>
        </div>
        
        <div id="status" class="status"></div>
    </div>
    
    <div class="modal" id="loadingModal">
        <div class="modal-content">
            <div class="loading">
                <div class="spinner"></div>
                <p id="loadingText">正在生成 PPT...</p>
            </div>
        </div>
    </div>
    
    <script>
        let allNews = [];
        let selectedNews = [];
        
        // Set default report date
        document.getElementById('reportDate').value = getWeekString();
        
        function getWeekString() {
            const now = new Date();
            const weekNum = Math.ceil((now.getDate() + new Date(now.getFullYear(), now.getMonth(), 1).getDay()) / 7);
            return `${now.getFullYear()}年${now.getMonth() + 1}月第${weekNum}周`;
        }
        
        function getImportanceClass(score) {
            if (score >= 70) return 'importance-high';
            if (score >= 50) return 'importance-medium';
            return 'importance-low';
        }
        
        async function searchNews() {
            const days = document.getElementById('dateRange').value;
            
            // Show loading
            ['model', 'application', 'investment'].forEach(cat => {
                document.getElementById(`${cat}-list`).innerHTML = `
                    <div class="loading">
                        <div class="spinner"></div>
                        <p>搜索中...</p>
                    </div>
                `;
                document.getElementById(`${cat}-count`).textContent = '(...)';
            });
            
            try {
                const response = await fetch('/api/search', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ days: parseInt(days) })
                });
                
                const data = await response.json();
                allNews = data.news || [];
                
                document.getElementById('totalCount').textContent = allNews.length;
                
                // Sort into categories
                const categorized = {
                    model: allNews.filter(n => n.category === 'model'),
                    application: allNews.filter(n => n.category === 'application'),
                    investment: allNews.filter(n => n.category === 'investment')
                };
                
                // Render each category
                Object.keys(categorized).forEach(cat => {
                    const list = document.getElementById(`${cat}-list`);
                    const items = categorized[cat];
                    
                    document.getElementById(`${cat}-count`).textContent = `(${items.length})`;
                    
                    if (items.length === 0) {
                        list.innerHTML = '<div class="empty">暂无相关新闻</div>';
                    } else {
                        list.innerHTML = items.map((item, idx) => `
                            <div class="news-item" data-category="${cat}" data-index="${idx}" onclick="toggleSelect(this, '${cat}', ${idx})">
                                <span class="date-badge">${item.date_display || item.date || '近期'}</span>
                                <span class="importance-badge ${getImportanceClass(item.importance)}">${item.importance}</span>
                                ${item.search_result ? '<span class="search-tag">🔍 搜索</span>' : ''}
                                ${item.gaming_related ? '<span class="gaming-tag">🎮 游戏</span>' : ''}
                                <div class="title">${escapeHtml(item.title)}</div>
                                <div class="desc">${escapeHtml(item.description)}</div>
                                <div class="meta">
                                    <span class="source-link">📎 <a href="${item.url}" target="_blank" onclick="event.stopPropagation()">${item.source || 'Unknown'}</a></span>
                                </div>
                            </div>
                        `).join('');
                    }
                });
                
                showStatus(`找到 ${allNews.length} 条新闻，按重要性排序`, 'success');
                
            } catch (error) {
                showStatus('搜索失败: ' + error.message, 'error');
            }
        }
        
        function toggleSelect(element, category, index) {
            const news = allNews.filter(n => n.category === category)[index];
            const existingIndex = selectedNews.findIndex(n => n.url === news.url);
            
            if (existingIndex >= 0) {
                // Deselect
                selectedNews.splice(existingIndex, 1);
                element.classList.remove('selected');
            } else {
                // Select (no limit per category now)
                selectedNews.push(news);
                element.classList.add('selected');
            }
            
            updateSelectedPanel();
        }
        
        function updateSelectedPanel() {
            const container = document.getElementById('selectedItems');
            document.getElementById('selectedCount').textContent = selectedNews.length;
            
            if (selectedNews.length === 0) {
                container.innerHTML = '<span style="color: #666">点击新闻卡片进行选择</span>';
            } else {
                // Sort by category for display
                const sorted = [...selectedNews].sort((a, b) => {
                    const order = { model: 0, application: 1, investment: 2 };
                    return order[a.category] - order[b.category];
                });
                
                container.innerHTML = sorted.map((news, idx) => {
                    const originalIdx = selectedNews.findIndex(n => n.url === news.url);
                    return `
                        <div class="selected-tag ${news.category}">
                            <span>${getCategoryEmoji(news.category)} ${truncate(news.title, 25)}</span>
                            <span class="remove" onclick="removeSelected(${originalIdx}); event.stopPropagation();">✕</span>
                        </div>
                    `;
                }).join('');
            }
            
            // Enable/disable generate button
            document.getElementById('generateBtn').disabled = selectedNews.length === 0;
        }
        
        function removeSelected(index) {
            const news = selectedNews[index];
            selectedNews.splice(index, 1);
            
            // Update UI
            document.querySelectorAll('.news-item.selected').forEach(el => {
                const cat = el.dataset.category;
                const idx = parseInt(el.dataset.index);
                const item = allNews.filter(n => n.category === cat)[idx];
                if (item && item.url === news.url) {
                    el.classList.remove('selected');
                }
            });
            
            updateSelectedPanel();
        }
        
        function getCategoryEmoji(cat) {
            const emojis = { model: '🧠', application: '📱', investment: '💰' };
            return emojis[cat] || '📰';
        }
        
        async function generatePPT() {
            if (selectedNews.length === 0) {
                showStatus('请先选择新闻', 'error');
                return;
            }
            
            const dateRange = document.getElementById('reportDate').value;
            
            // Show loading modal
            document.getElementById('loadingModal').classList.add('active');
            document.getElementById('loadingText').textContent = '正在生成 PPT...';
            
            try {
                const response = await fetch('/api/generate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ news: selectedNews, date_range: dateRange })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    document.getElementById('loadingText').textContent = '生成完成！正在下载...';
                    
                    // Download file
                    window.location.href = '/api/download?file=' + encodeURIComponent(data.filename);
                    
                    setTimeout(() => {
                        document.getElementById('loadingModal').classList.remove('active');
                        showStatus(`PPT 生成成功！共 ${selectedNews.length} 条新闻`, 'success');
                    }, 1500);
                } else {
                    throw new Error(data.error || '生成失败');
                }
                
            } catch (error) {
                document.getElementById('loadingModal').classList.remove('active');
                showStatus('生成失败: ' + error.message, 'error');
            }
        }
        
        function showStatus(message, type) {
            const status = document.getElementById('status');
            status.textContent = message;
            status.className = `status ${type}`;
            
            setTimeout(() => {
                status.className = 'status';
            }, 5000);
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        function truncate(text, length) {
            return text.length > length ? text.substring(0, length) + '...' : text;
        }
        
        async function addCustomNews(category) {
            const input = document.getElementById(`add-${category}-input`);
            const value = input.value.trim();
            
            if (!value) {
                showStatus('请输入链接或新闻内容', 'error');
                return;
            }
            
            // Check if it's a URL
            const isUrl = value.startsWith('http://') || value.startsWith('https://');
            
            try {
                let newsItem;
                
                if (isUrl) {
                    // Fetch article from URL
                    showStatus('正在抓取文章...', 'success');
                    const response = await fetch('/api/fetch-url', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ url: value, category: category })
                    });
                    
                    const data = await response.json();
                    if (!data.success) {
                        throw new Error(data.error || '抓取失败');
                    }
                    newsItem = data.news;
                } else {
                    // Direct text input - create news item
                    newsItem = {
                        title: value,
                        description: '',
                        url: '',
                        source: '手动添加',
                        date: new Date().toISOString().split('T')[0],
                        date_display: `${new Date().getMonth() + 1}月${new Date().getDate()}日`,
                        date_full: `${new Date().getFullYear()}年${String(new Date().getMonth() + 1).padStart(2, '0')}月${String(new Date().getDate()).padStart(2, '0')}日`,
                        category: category,
                        importance: 80,
                        custom: true
                    };
                }
                
                newsItem.category = category;
                newsItem.custom = true;
                
                // Add to allNews and render
                allNews.push(newsItem);
                renderCategoryNews(category);
                
                // Auto-select the new item
                selectedNews.push(newsItem);
                updateSelectedPanel();
                
                // Clear input
                input.value = '';
                showStatus('已添加并自动选中', 'success');
                
            } catch (error) {
                showStatus('添加失败: ' + error.message, 'error');
            }
        }
        
        function renderCategoryNews(category) {
            const list = document.getElementById(`${category}-list`);
            const items = allNews.filter(n => n.category === category);

            document.getElementById(`${category}-count`).textContent = `(${items.length})`;

            if (items.length === 0) {
                list.innerHTML = '<div class="empty">暂无相关新闻</div>';
            } else {
                list.innerHTML = items.map((item, idx) => {
                    const isSelected = selectedNews.some(n => n.url === item.url && n.title === item.title);
                    return `
                        <div class="news-item ${isSelected ? 'selected' : ''} ${item.custom ? 'custom' : ''}" data-category="${category}" data-index="${idx}" onclick="toggleSelect(this, '${category}', ${idx})">
                            <span class="date-badge">${item.date_display || item.date || '近期'}</span>
                            ${item.custom ? '<span class="custom-tag">✋ 手动</span>' : `<span class="importance-badge ${getImportanceClass(item.importance)}">${item.importance}</span>`}
                            ${item.search_result ? '<span class="search-tag">🔍 搜索</span>' : ''}
                            ${item.gaming_related ? '<span class="gaming-tag">🎮 游戏</span>' : ''}
                            <div class="title">${escapeHtml(item.title)}</div>
                            <div class="desc">${escapeHtml(item.description || '')}</div>
                            <div class="meta">
                                <span class="source-link">📎 ${item.url ? `<a href="${item.url}" target="_blank" onclick="event.stopPropagation()">${item.source || 'Unknown'}</a>` : (item.source || '手动添加')}</span>
                            </div>
                        </div>
                    `;
                }).join('');
            }
        }

        async function keywordSearch() {
            const keywords = document.getElementById('keywordInput').value.trim();
            if (!keywords) {
                showStatus('请输入搜索关键词', 'error');
                return;
            }

            const days = parseInt(document.getElementById('dateRange').value);
            const btn = document.getElementById('keywordSearchBtn');
            btn.disabled = true;
            btn.textContent = '🔍 搜索中...';

            try {
                const response = await fetch('/api/keyword-search', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ keywords: keywords, days: days })
                });

                const data = await response.json();

                if (!data.success) {
                    throw new Error(data.error || '搜索失败');
                }

                const searchResults = data.news || [];

                // 合并搜索结果到 allNews，去重
                let addedCount = 0;
                for (const item of searchResults) {
                    item.search_result = true;
                    const exists = allNews.some(n =>
                        (n.url && n.url === item.url) ||
                        (n.title && n.title.substring(0, 30) === item.title.substring(0, 30))
                    );
                    if (!exists) {
                        allNews.push(item);
                        addedCount++;
                    }
                }

                // 更新总数
                document.getElementById('totalCount').textContent = allNews.length;

                // 重新渲染所有分类
                ['model', 'application', 'investment'].forEach(cat => {
                    renderCategoryNews(cat);
                });

                showStatus(`搜索完成：找到 ${searchResults.length} 条结果，新增 ${addedCount} 条`, 'success');

            } catch (error) {
                showStatus('搜索失败: ' + error.message, 'error');
            } finally {
                btn.disabled = false;
                btn.textContent = '🔍 搜索文章';
            }
        }
    </script>
</body>
</html>
